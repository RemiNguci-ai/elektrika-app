        <span style="font-size:16px;font-weight:800;color:var(--text)">${title}</span>
      </div>
      ${itemsHtml}
    </div>`;
  }

  let html = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">`;

  html += folderCard('📦','Kapitel 3 – Lager & Material','#f59e0b',[
    {page:'lager',        icon:'📦', label:'Lager / Bestand',     export:'exportExcel()'},
    {page:'bestellungen', icon:'🛒', label:'Bestellungen'},
  ]);

  html += folderCard('🏗️','Kapitel 4 – Projektmanagement','#3b82f6',[
    {page:'projekte',  icon:'📁', label:'Projekte'},
    {page:'auftraege', icon:'📝', label:'Aufträge'},
    {page:'journal',   icon:'📔', label:'Tagesberichte'},
    {page:'kalender',  icon:'📅', label:'Kalender'},
    {page:'kunden',    icon:'👥', label:'Kunden'},
  ]);

  html += folderCard('🔍','Kapitel 5 – Prüfung & Messung','#8b5cf6',[
    {page:'pruefung',    icon:'🔍', label:'Prüfprotokolle'},
    {page:'messgeraete', icon:'🔧', label:'Messgeräte'},
  ]);

  if (isChef) {
    html += folderCard('💶','Kapitel 7 – Buchhaltung','#10b981',[
      {page:'kva',         icon:'📋', label:'KVA / Kostenvoranschlag'},
      {page:'angebote',    icon:'📄', label:'Angebote'},
      {page:'rechnungen',  icon:'💶', label:'Rechnungen'},
      {page:'finanzen',    icon:'📊', label:'Finanzen'},
      {page:'buchhaltung', icon:'📊', label:'Buchhaltung'},
    ]);

    html += folderCard('👥','Team & System','#6366f1',[
      {page:'team',         icon:'👷', label:'Mitarbeiter / Team'},
      {page:'profil',       icon:'👤', label:'Mein Profil'},
      {page:'einstellungen',icon:'⚙️', label:'Einstellungen'},

  }

  html += `</div>`;

}

function switchAnleitungTab(lang, el) {
  document.getElementById('anleitung-de').style.display = lang==='de' ? 'block' : 'none';

  el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

}

        </tr></thead>
        <tbody>
          ${einnahmen.length===0?`<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:20px">${L('Keine Einnahmen erfasst','Nuk ka të ardhura')}</td></tr>`:
            einnahmen.slice().sort((a,b)=>b.datum.localeCompare(a.datum)).map(x=>`<tr>
              <td style="white-space:nowrap">${x.datum}</td>
              <td><strong>${x.bezeichnung}</strong>${x.notiz?`<br><small style="color:var(--text2)">${x.notiz}</small>`:''}</td>
              <td><span class="badge badge-green" style="font-size:10px">${x.kategorie}</span></td>
              <td style="color:var(--text2);font-size:12px">${x.belegnr||'—'}</td>
              <td style="text-align:right;font-weight:700;color:var(--success)">${fmt(x.betrag)}</td>
              <td style="white-space:nowrap">
                <button class="btn btn-sm btn-secondary" onclick="openBuchModal('einnahmen',${x.id})">✏</button>
                <button class="btn btn-sm btn-danger" onclick="deleteBuch('einnahmen',${x.id})">🗑️ Löschen</button>
              </td>
            </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="4" style="font-weight:700;padding:8px 4px">${L('Gesamt','Totali')}</td>
          <td style="text-align:right;font-weight:800;font-size:14px;color:var(--success)">${fmt(sumEin)}</td>
          <td></td>
        </tr></tfoot>
      </table>
    </div>`;

  // --- AUSGABEN TAB ---
  const ausgabenHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-title" style="margin:0">💸 ${L('Ausgaben','Shpenzime')}</div>
        <button class="btn btn-primary" onclick="openBuchModal('ausgaben',null)">+ ${L('Ausgabe','Shpenzim')}</button>
      </div>
      <table id="buch-aus-table">
        <thead><tr>
          <th>${L('Datum','Data')}</th><th>${L('Bezeichnung','Emërtimi')}</th>
          <th>${L('Kategorie','Kategoria')}</th><th>${L('Beleg-Nr.','Nr. Dok.')}</th>
          <th style="text-align:right">${L('Betrag','Shuma')}</th><th></th>
        </tr></thead>
        <tbody>
          ${ausgaben.length===0?`<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:20px">${L('Keine Ausgaben erfasst','Nuk ka shpenzime')}</td></tr>`:
            ausgaben.slice().sort((a,b)=>b.datum.localeCompare(a.datum)).map(x=>`<tr>
              <td style="white-space:nowrap">${x.datum}</td>
              <td><strong>${x.bezeichnung}</strong>${x.notiz?`<br><small style="color:var(--text2)">${x.notiz}</small>`:''}</td>
              <td><span class="badge badge-red" style="font-size:10px">${x.kategorie}</span></td>
              <td style="color:var(--text2);font-size:12px">${x.belegnr||'—'}</td>
              <td style="text-align:right;font-weight:700;color:var(--danger)">${fmt(x.betrag)}</td>
              <td style="white-space:nowrap">
                <button class="btn btn-sm btn-secondary" onclick="openBuchModal('ausgaben',${x.id})">✏</button>
                <button class="btn btn-sm btn-danger" onclick="deleteBuch('ausgaben',${x.id})">🗑️ Löschen</button>
              </td>
            </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="4" style="font-weight:700;padding:8px 4px">${L('Gesamt','Totali')}</td>
          <td style="text-align:right;font-weight:800;font-size:14px;color:var(--danger)">${fmt(sumAus)}</td>
          <td></td>
        </tr></tfoot>
      </table>
    </div>`;

  // --- FIXKOSTEN TAB ---
  const fixkostenHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-title" style="margin:0">📌 ${L('Fixkosten','Kostot Fikse')}</div>
        <button class="btn btn-primary" onclick="openBuchModal('fixkosten',null)">+ ${L('Fixkosten','Kosto Fikse')}</button>
      </div>
      <table>
        <thead><tr>
          <th>${L('Bezeichnung','Emërtimi')}</th><th>${L('Kategorie','Kategoria')}</th>
          <th>${L('Intervall','Intervali')}</th><th>${L('Fälligkeit','Maturimi')}</th>
          <th style="text-align:right">${L('Betrag','Shuma')}</th>
          <th style="text-align:right">${L('/ Monat','/ Muaj')}</th><th></th>
        </tr></thead>
        <tbody>
          ${fixkosten.length===0?`<tr><td colspan="7" style="text-align:center;color:var(--text2);padding:20px">${L('Keine Fixkosten erfasst','Nuk ka kosto fikse')}</td></tr>`:
            fixkosten.map(x=>{
              const monatl = parseFloat(x.betrag||0) / (x.interval==='jährlich'?12:x.interval==='vierteljährlich'?3:x.interval==='halbjährlich'?6:1);
              return `<tr>
                <td><strong>${x.bezeichnung}</strong></td>
                <td><span class="badge badge-blue" style="font-size:10px">${x.kategorie}</span></td>
                <td>${x.interval}</td>
                <td style="color:var(--text2);font-size:12px">${x.faelligkeit||'—'}</td>
                <td style="text-align:right;font-weight:600">${fmt(x.betrag)}</td>
                <td style="text-align:right;color:var(--primary);font-weight:700">${fmt(monatl)}</td>
                <td style="white-space:nowrap">
                  <button class="btn btn-sm btn-secondary" onclick="openBuchModal('fixkosten',${x.id})">✏</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteBuch('fixkosten',${x.id})">🗑️ Löschen</button>
                </td>
              </tr>`;
            }).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="4" style="font-weight:700;padding:8px 4px">${L('Gesamt / Monat','Totali / Muaj')}</td>
          <td></td>
          <td style="text-align:right;font-weight:800;font-size:14px;color:var(--primary)">${fmt(sumFix)}</td>
          <td></td>
        </tr></tfoot>
      </table>
    </div>`;

  // --- ÜBERSICHT TAB ---
  const monate = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const selJahr = _buchJahr;

  // Monatsdaten für gewähltes Jahr
  const moData = monate.map((_,i)=>{
    const ein = einnahmen.filter(x=>{ const d=new Date(x.datum); return d.getMonth()===i&&d.getFullYear()===selJahr; }).reduce((s,x)=>s+parseFloat(x.betrag||0),0);
    const aus = ausgaben.filter(x=>{ const d=new Date(x.datum); return d.getMonth()===i&&d.getFullYear()===selJahr; }).reduce((s,x)=>s+parseFloat(x.betrag||0),0);
    return {ein, aus, fix:sumFix, erg: ein-aus-sumFix};
  });

  // Jahr-Summen für gewähltes Jahr
  const sumEinJ = moData.reduce((s,m)=>s+m.ein,0);
  const sumAusJ = moData.reduce((s,m)=>s+m.aus,0);
  const balanceJ = sumEinJ - sumAusJ - sumFix*12;

  const monatsRows = moData.map((m,i)=>`
    <tr style="background:${i%2===0?'transparent':'rgba(255,255,255,.02)'}">
      <td style="font-weight:600">${monate[i]} ${selJahr}</td>
      <td style="color:var(--success);text-align:right">${m.ein>0?fmt(m.ein):'—'}</td>
      <td style="color:var(--danger);text-align:right">${m.aus>0?fmt(m.aus):'—'}</td>
      <td style="color:var(--primary);text-align:right">${fmt(m.fix)}</td>
      <td style="font-weight:700;color:${m.erg>=0?'var(--success)':'var(--danger)'};text-align:right">${m.erg>=0?'▲':'▼'} ${fmt(Math.abs(m.erg))}</td>
    </tr>`).join('');

  // Jahres-Auswahl (alle Jahre mit Daten + aktuelles)
  const alleJahre = [...new Set([
    ...Array.from({length:2036-2020+1},(_,i)=>2020+i),
    ...einnahmen.map(x=>new Date(x.datum).getFullYear()),
    ...ausgaben.map(x=>new Date(x.datum).getFullYear()),
  ])].filter(y=>!isNaN(y)&&y>=2020&&y<=2036).sort((a,b)=>b-a);
  const jahrOpts = alleJahre.map(y=>`<option value="${y}" ${y===selJahr?'selected':''}>${y}</option>`).join('');

  // --- SVG BALKENDIAGRAMM ---
  const chartW = 520, chartH = 160, padL = 40, padB = 30, padT = 10, padR = 10;
  const innerW = chartW - padL - padR;
  const innerH = chartH - padB - padT;
  const maxVal = Math.max(...moData.map(m=>Math.max(m.ein, m.aus+m.fix, 1)), 1);
  const barW   = innerW / 12;
  const bw     = barW * 0.36;

  const bars = moData.map((m,i)=>{
    const x0   = padL + i*barW + barW*0.08;
    const hEin = (m.ein/(maxVal||1))*innerH;
    const hAus = ((m.aus+m.fix)/(maxVal||1))*innerH;
    const yEin = padT + innerH - hEin;
    const yAus = padT + innerH - hAus;
    const erg  = m.ein - m.aus - m.fix;
    return `
      <rect x="${(x0).toFixed(1)}" y="${yEin.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(hEin,1).toFixed(1)}" fill="#10b981" rx="2" opacity="0.85">
        <title>${monate[i]}: ${L('Einnahmen','Të ardhura')} ${fmt(m.ein)}</title></rect>
      <rect x="${(x0+bw+1).toFixed(1)}" y="${yAus.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(hAus,1).toFixed(1)}" fill="#ef4444" rx="2" opacity="0.85">
        <title>${monate[i]}: ${L('Kosten','Kostot')} ${fmt(m.aus+m.fix)}</title></rect>
      ${erg!==0?`<rect x="${(x0).toFixed(1)}" y="${(erg>=0?yEin-6:padT+innerH).toFixed(1)}" width="${(bw*2+1).toFixed(1)}" height="3" fill="${erg>=0?'#10b981':'#ef4444'}" rx="1" opacity="0.5"/>`:''}`
    ;
  }).join('');

  // Y-Achse Beschriftung
  const yLabels = [0,0.25,0.5,0.75,1].map(f=>{
    const val = maxVal*f;
    const y   = padT + innerH - f*innerH;
    const lbl = val>=1000?'€'+(val/1000).toFixed(1)+'k':'€'+val.toFixed(0);
    return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${(chartW-padR).toFixed(1)}" y2="${y.toFixed(1)}" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3"/>
            <text x="${(padL-4).toFixed(1)}" y="${(y+3).toFixed(1)}" text-anchor="end" fill="#888" font-size="7">${lbl}</text>`;
  }).join('');

  // X-Achse Monatsbeschriftungen
  const xLabels = monate.map((mo,i)=>{
    const x = padL + i*barW + barW/2;
    return `<text x="${x.toFixed(1)}" y="${(chartH-6).toFixed(1)}" text-anchor="middle" fill="#888" font-size="7">${mo}</text>`;
  }).join('');

  const barChart = `
    <div style="margin-top:16px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px;display:flex;gap:16px">
        <span><span style="display:inline-block;width:10px;height:10px;background:#10b981;border-radius:2px;margin-right:4px"></span>${L('Einnahmen','Të ardhura')}</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#ef4444;border-radius:2px;margin-right:4px"></span>${L('Ausgaben + Fixkosten','Shpenzime + Kosto Fikse')}</span>
      </div>
      <div style="overflow-x:auto">
        <svg viewBox="0 0 ${chartW} ${chartH}" width="100%" style="min-width:320px;max-width:${chartW}px">
          ${yLabels}
          ${bars}
          ${xLabels}
          <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+innerH}" stroke="#555" stroke-width="1"/>
          <line x1="${padL}" y1="${padT+innerH}" x2="${chartW-padR}" y2="${padT+innerH}" stroke="#555" stroke-width="1"/>
        </svg>
      </div>
    </div>`;

  const uebersichtHTML = `
    <div class="grid-2" style="gap:16px">
      <!-- JAHRESÜBERSICHT TABELLE -->
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div class="card-title" style="margin:0">📊 ${L('Jahresübersicht','Pasqyra Vjetore')}</div>
          <select onchange="setBuchJahr(this.value)" style="padding:4px 10px;font-size:13px;font-weight:700;border-radius:6px">
            ${jahrOpts}
          </select>
        </div>
        <table>
          <thead><tr>
            <th>${L('Monat','Muaji')}</th>
            <th style="text-align:right">💰 ${L('Einnahmen','Të Ardhura')}</th>
            <th style="text-align:right">💸 ${L('Ausgaben','Shpenzime')}</th>
            <th style="text-align:right">📌 ${L('Fixkosten','Kosto Fikse')}</th>
            <th style="text-align:right">= ${L('Ergebnis','Rezultati')}</th>
          </tr></thead>
          <tbody>${monatsRows}</tbody>
          <tfoot><tr>
            <td style="font-weight:700">${L('Gesamt','Totali')}</td>
            <td style="text-align:right;font-weight:700;color:var(--success)">${fmt(sumEinJ)}</td>
            <td style="text-align:right;font-weight:700;color:var(--danger)">${fmt(sumAusJ)}</td>
            <td style="text-align:right;font-weight:700;color:var(--primary)">${fmt(sumFix*12)}</td>
            <td style="text-align:right;font-weight:800;font-size:14px;color:${balanceJ>=0?'var(--success)':'var(--danger)'}">
              ${balanceJ>=0?'▲':'▼'} ${fmt(Math.abs(balanceJ))}
            </td>
          </tr></tfoot>
        </table>
      </div>

      <!-- KOSTENSTRUKTUR + BALKENDIAGRAMM -->
      <div class="card">
        <div class="card-title">📋 ${L('Kostenstruktur','Struktura e Kostove')}</div>
        ${[
          {label:L('Gesamte Einnahmen','Të Ardhura Totale'), val:sumEinJ, color:'#10b981'},
          {label:L('Variable Ausgaben','Shpenzime Variable'),  val:sumAusJ,  color:'#ef4444'},
          {label:L('Fixkosten / Jahr','Kosto Fikse / Vit'),    val:sumFix*12,color:'#3b82f6'},
          {label:L('Gesamtkosten','Kostot Totale'),             val:sumAusJ+sumFix*12, color:'#f59e0b'},
        ].map(row=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:13px;color:var(--text2)">${row.label}</span>
              <span style="font-weight:700;color:${row.color}">${fmt(row.val)}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${Math.min((row.val/(sumEinJ||1))*100,100).toFixed(1)}%;background:${row.color}"></div></div>
          </div>`).join('')}

        <!-- JAHRESERGEBNIS BOX -->
        <div style="margin-top:14px;padding:14px;border-radius:8px;background:${balanceJ>=0?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)'};border:1px solid ${balanceJ>=0?'#10b981':'#ef4444'}">
          <div style="font-size:11px;color:var(--text2);margin-bottom:4px">${L('Jahresergebnis','Rezultati Vjetor')} ${selJahr}</div>
          <div style="font-size:22px;font-weight:800;color:${balanceJ>=0?'#10b981':'#ef4444'}">
            ${balanceJ>=0?'▲':'▼'} ${fmt(Math.abs(balanceJ))}
          </div>
          <div style="font-size:11px;color:var(--text2);margin-top:4px">
            ${L('Marge','Marzhi')}: ${sumEinJ>0?((balanceJ/sumEinJ)*100).toFixed(1)+'%':'—'}
          </div>
        </div>

        <!-- BALKENDIAGRAMM -->
        <div style="margin-top:16px">
          <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px">
            📊 ${L('Monatlicher Vergleich','Krahasimi mujor')} ${selJahr}
          </div>
          ${barChart}
        </div>
      </div>
    </div>`;

  const content = {einnahmen:einnahmenHTML, ausgaben:ausgabenHTML, fixkosten:fixkostenHTML, uebersicht:uebersichtHTML}[_buchTab];

  return `${strip}${tabBar}${content}`;
}

function openBuchModal(typ, id) {
  const L = (de,sq) => currentLang==='sq'?sq:de;
  const arr = DB.get('buch_'+typ);
  const x = id ? arr.find(a=>a.id===id) : null;
  const katList = BUCH_KAT[typ]||[];
  const katOpts = katList.map(k=>`<option value="${k}" ${x&&x.kategorie===k?'selected':''}>${k}</option>`).join('');
  const heute = new Date().toISOString().split('T')[0];
  const titles = {einnahmen:L('Einnahme','E ardhur'), ausgaben:L('Ausgabe','Shpenzim'), fixkosten:L('Fixkosten','Kosto Fikse')};
  const icons  = {einnahmen:'💰', ausgaben:'💸', fixkosten:'📌'};

  const isFixed = typ==='fixkosten';
  openModal(`${icons[typ]} ${x?L('Bearbeiten','Ndrysho'):L('Neue','E re')} ${titles[typ]}`, `
    <div class="form-group"><label>${L('Bezeichnung','Emërtimi')}</label>
      <input id="buch-bez" value="${x?x.bezeichnung:''}" placeholder="${L('z.B. Elektromaterial Baustelle A','p.sh. Material elektrik kantieri A')}"></div>
    <div class="grid-2">
      <div class="form-group"><label>${L('Kategorie','Kategoria')}</label>
        <select id="buch-kat">${katOpts}</select></div>
      ${isFixed
        ? `<div class="form-group"><label>${L('Intervall','Intervali')}</label>
            <select id="buch-interval">${BUCH_INTERVALL.map(i=>`<option value="${i}" ${x&&x.interval===i?'selected':''}>${i}</option>`).join('')}</select></div>`
        : `<div class="form-group"><label>${L('Datum','Data')}</label>
            <input type="date" id="buch-datum" value="${x?x.datum:heute}"></div>`}
    </div>
    <div class="grid-2">
      <div class="form-group"><label>${L('Betrag (€)','Shuma (€)')}</label>
        <input type="number" id="buch-betrag" value="${x?x.betrag:''}" min="0" step="0.01" placeholder="0,00"></div>
      ${isFixed
        ? `<div class="form-group"><label>${L('Fälligkeitstag (1–31)','Dita e Maturimit (1–31)')}</label>
            <input type="number" id="buch-faelligkeit" value="${x?x.faelligkeit:''}" min="1" max="31" placeholder="1"></div>`
        : `<div class="form-group"><label>${L('Beleg-Nr. / Rechnung','Nr. Dok. / Faturë')}</label>
            <input id="buch-belegnr" value="${x?x.belegnr:''}" placeholder="${L('z.B. RE-2024-001','p.sh. FA-2024-001')}"></div>`}
    </div>
    <div class="form-group"><label>${L('Notiz / Bemerkung','Shënim / Vërejtje')}</label>
      <textarea id="buch-notiz" rows="2" placeholder="${L('Optional...','Opsionale...')}">${x?x.notiz||'':''}</textarea></div>
  `, [
    {label:L('Abbrechen','Anulo'), onclick:'closeModal()'},
    {label:L('Speichern','Ruaj'), onclick:`saveBuch('${typ}',${id||'null'})`, class:'btn-primary'}
  ]);
}

function saveBuch(typ, id) {
  const arr = DB.get('buch_'+typ);
  const isFixed = typ==='fixkosten';
  const bez = document.getElementById('buch-bez')?.value||'';
  if (!bez.trim()) { alert(currentLang==='sq'?'Shkruani emërtimin!':'Bitte Bezeichnung eingeben!'); return; }
  const obj = {
    id: id||Date.now(),
    bezeichnung: bez,
    kategorie: document.getElementById('buch-kat')?.value||'',
    betrag: parseFloat(document.getElementById('buch-betrag')?.value||0),
    notiz: document.getElementById('buch-notiz')?.value||'',
    ...(isFixed ? {
      interval: document.getElementById('buch-interval')?.value||'monatlich',
      faelligkeit: document.getElementById('buch-faelligkeit')?.value||'',
    } : {
      datum: document.getElementById('buch-datum')?.value||'',
      belegnr: document.getElementById('buch-belegnr')?.value||'',
    }),
  };
  if (id) { const i=arr.findIndex(a=>a.id===id); arr[i]=obj; } else arr.push(obj);
  DB.set('buch_'+typ, arr);
  closeModal(); showPage('buchhaltung');
}

function deleteBuch(typ, id) {
  confirmDelete(
    currentLang==='sq'?'Hyrja do të fshihet!':'Eintrag wirklich löschen?',
    function(){DB.set('buch_'+typ,DB.get('buch_'+typ).filter(function(x){return x.id!==id;}));showPage('buchhaltung');}
  );
}

function exportBuchExcel() {
  const L = (de,sq) => currentLang==='sq'?sq:de;
  const einnahmen = DB.get('buch_einnahmen');
  const ausgaben  = DB.get('buch_ausgaben');
  const fixkosten = DB.get('buch_fixkosten');
  const profil    = DB.getObj('profil',{});
  const now       = new Date().toLocaleDateString('de-DE');

  const esc = v => `"${String(v||'').replace(/"/g,'""')}"`;
  const row = arr => arr.join(';')+'\r\n';

  let csv = '﻿'; // BOM für Excel UTF-8
  csv += row([esc('BUCHHALTUNG – '+( profil.firma||'Elektrika')), esc('Exportiert:'), esc(now)]);
  csv += row([]);

  // EINNAHMEN
  csv += row([esc('=== EINNAHMEN ===')]);
  csv += row([esc(L('Datum','Data')), esc(L('Bezeichnung','Emërtimi')), esc(L('Kategorie','Kategoria')), esc(L('Beleg-Nr.','Nr. Dok.')), esc(L('Betrag €','Shuma €')), esc(L('Notiz','Shënim'))]);
  einnahmen.slice().sort((a,b)=>a.datum.localeCompare(b.datum)).forEach(x=>{
    csv += row([esc(x.datum), esc(x.bezeichnung), esc(x.kategorie), esc(x.belegnr||''), esc(parseFloat(x.betrag||0).toFixed(2)), esc(x.notiz||'')]);
  });
  const sumEin = einnahmen.reduce((s,x)=>s+parseFloat(x.betrag||0),0);
  csv += row([esc(''),esc(''),esc(''),esc(L('GESAMT','TOTALI')), esc(sumEin.toFixed(2)),esc('')]);
  csv += row([]);

  // AUSGABEN
  csv += row([esc('=== AUSGABEN ===')]);
  csv += row([esc(L('Datum','Data')), esc(L('Bezeichnung','Emërtimi')), esc(L('Kategorie','Kategoria')), esc(L('Beleg-Nr.','Nr. Dok.')), esc(L('Betrag €','Shuma €')), esc(L('Notiz','Shënim'))]);
  ausgaben.slice().sort((a,b)=>a.datum.localeCompare(b.datum)).forEach(x=>{
    csv += row([esc(x.datum), esc(x.bezeichnung), esc(x.kategorie), esc(x.belegnr||''), esc(parseFloat(x.betrag||0).toFixed(2)), esc(x.notiz||'')]);
  });
  const sumAus = ausgaben.reduce((s,x)=>s+parseFloat(x.betrag||0),0);
  csv += row([esc(''),esc(''),esc(''),esc(L('GESAMT','TOTALI')), esc(sumAus.toFixed(2)),esc('')]);
  csv += row([]);

  // FIXKOSTEN
  csv += row([esc('=== FIXKOSTEN ===')]);
  csv += row([esc(L('Bezeichnung','Emërtimi')), esc(L('Kategorie','Kategoria')), esc(L('Intervall','Intervali')), esc(L('Fälligkeit','Maturimi')), esc(L('Betrag €','Shuma €')), esc(L('/ Monat €','/ Muaj €'))]);
  fixkosten.forEach(x=>{
    const monatl = parseFloat(x.betrag||0)/(x.interval==='jährlich'?12:x.interval==='vierteljährlich'?3:x.interval==='halbjährlich'?6:1);
    csv += row([esc(x.bezeichnung), esc(x.kategorie), esc(x.interval), esc(x.faelligkeit||''), esc(parseFloat(x.betrag||0).toFixed(2)), esc(monatl.toFixed(2))]);
  });
  const sumFix = fixkosten.reduce((s,x)=>{
    const b=parseFloat(x.betrag||0);
    return s+(x.interval==='jährlich'?b/12:x.interval==='vierteljährlich'?b/3:x.interval==='halbjährlich'?b/6:b);
  },0);
  csv += row([esc(''),esc(''),esc(''),esc(L('GESAMT / MONAT','TOTALI / MUAJ')), esc(''), esc(sumFix.toFixed(2))]);
  csv += row([]);

  // ZUSAMMENFASSUNG
  csv += row([esc('=== ZUSAMMENFASSUNG ===')]);
  csv += row([esc(L('Position','Pozicioni')), esc(L('Betrag €','Shuma €'))]);
  csv += row([esc(L('Einnahmen gesamt','Të ardhura totale')), esc(sumEin.toFixed(2))]);
  csv += row([esc(L('Ausgaben gesamt','Shpenzime totale')), esc(sumAus.toFixed(2))]);
  csv += row([esc(L('Fixkosten / Jahr','Kosto fikse / vit')), esc((sumFix*12).toFixed(2))]);
  csv += row([esc(L('Gesamtkosten','Kostot totale')), esc((sumAus+sumFix*12).toFixed(2))]);
  const balance = sumEin - sumAus - sumFix*12;
  csv += row([esc(balance>=0?L('ÜBERSCHUSS','TEPRICË'):L('DEFIZIT','DEFICIT')), esc(balance.toFixed(2))]);

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `Buchhaltung_${new Date().getFullYear()}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function kvaPage() {
  const docs = DB.get('kva_docs');
  const L = (de,sq) => currentLang==='sq'?sq:de;
  const statusColor = (s) => ({
    'Offen':'badge-yellow','Angenommen':'badge-green','Abgelehnt':'badge-red',
    'In Bearbeitung':'badge-blue','Bezahlt':'badge-green','Überfällig':'badge-red','Teilbezahlt':'badge-yellow'
  }[s]||'badge-gray');

  return `
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <input type="text" placeholder="${L('Suche...','Kërko...')}" oninput="filterTable('kva-table',this.value)" style="width:220px">
    <button class="btn btn-primary" onclick="openKVAForm(null,'kva')">+ ${L('Kostenvoranschlag','Preventiv')}</button>
    <button class="btn btn-secondary" onclick="openKVAForm(null,'rechnung')">+ ${L('Rechnung','Faturë')}</button>
  </div>
  <div class="card">
    <table id="kva-table">
      <thead><tr>
        <th>${L('Nummer','Nr.')}</th><th>${L('Typ','Lloji')}</th><th>${L('Kunde','Klienti')}</th>
        <th>${L('Projektart','Lloji Projektit')}</th><th>${L('Datum','Data')}</th>
        <th>${L('Betrag Netto','Shuma Neto')}</th><th>${L('Betrag Brutto','Shuma Bruto')}</th>
        <th>${L('Status','Statusi')}</th><th></th>
      </tr></thead>
      <tbody>
      ${docs.length===0?`<tr><td colspan="9" style="text-align:center;color:var(--text2);padding:30px">${L('Noch keine Dokumente. Erstellen Sie Ihren ersten Kostenvoranschlag!','Ende ka dokumente. Krijoni preventivun tuaj të parë!')}</td></tr>`:
        docs.map(d=>{
          const netto = (d.positionen||[]).reduce((s,p)=>s+(parseFloat(p.menge||0)*parseFloat(p.ep||0)),0);
          const rabatt = netto*(parseFloat(d.rabatt||0)/100);
          const mwst = (netto-rabatt)*(parseFloat(d.mwst||19)/100);
          const brutto = netto-rabatt+mwst;
          return `<tr data-search="${(d.nummer||'').toLowerCase()} ${(d.kunde||'').toLowerCase()}">

        }).join('')}

    </table>
  </div>`;
}

function kvaRow(p) {
  _kvaRowCount++;
  const n = _kvaRowCount;
  const katOpts = Object.keys(KVA_PRESET).map(k=>`<option value="${k}" ${p&&p.kat===k?'selected':''}>${k}</option>`).join('');
  const einheitOpts = KVA_EINHEITEN.map(e=>`<option value="${e}" ${p&&p.einheit===e?'selected':''}>${e}</option>`).join('');
  return `<tr id="kva-row-${n}">
    <td style="text-align:center;color:var(--text2);font-size:11px">${n}</td>
    <td><select style="font-size:11px;width:100%" onchange="kvaKatChange(this,${n})">${katOpts}</select></td>
    <td><input id="kva-bez-${n}" value="${p?p.bezeichnung:''}" style="font-size:11px;width:100%" oninput="calcKVASumme()"></td>
    <td><input type="number" id="kva-menge-${n}" value="${p?p.menge:1}" min="0" step="0.1" style="width:55px;font-size:11px" oninput="calcKVARow(${n})"></td>
    <td><select id="kva-einheit-${n}" style="font-size:11px">${einheitOpts.replace(`value="${p?p.einheit:'Stk'}"`,`value="${p?p.einheit:'Stk'}" selected`)}</select></td>
    <td><input type="number" id="kva-ep-${n}" value="${p?p.ep:0}" min="0" step="0.01" style="width:75px;font-size:11px" oninput="calcKVARow(${n})"></td>
    <td><input type="number" id="kva-gp-${n}" value="${p?(parseFloat(p.menge||1)*parseFloat(p.ep||0)).toFixed(2):0}" readonly style="width:75px;font-size:11px;background:var(--bg2)"></td>
    <td><button class="btn btn-sm btn-danger" style="padding:2px 6px;font-size:11px" onclick="document.getElementById('kva-row-${n}').remove();calcKVASumme()">✕</button></td>
  </tr>`;
}

function addKVARow(p) {
  const tbody = document.getElementById('kva-pos-body');
  if (!tbody) return;
  const div = document.createElement('tbody');
  div.innerHTML = kvaRow(p||null);
  tbody.appendChild(div.firstElementChild);
  calcKVASumme();
}

function addKVAPresetGroup(kat) {
  const items = KVA_PRESET[kat];
  if (!items) return;
  items.forEach(item => addKVARow({kat, bezeichnung:item.b, menge:1, einheit:item.e, ep:item.ep}));
}

function kvaKatChange(sel, n) {
  const kat = sel.value;
  const items = KVA_PRESET[kat];
  if (items && items.length) {
    const first = items[0];
    const bezEl = document.getElementById('kva-bez-'+n);
    const epEl = document.getElementById('kva-ep-'+n);
    const einEl = document.getElementById('kva-einheit-'+n);
    if (bezEl) bezEl.value = first.b;
    if (epEl) epEl.value = first.ep;
    if (einEl) Array.from(einEl.options).forEach(o=>{ o.selected = o.value===first.e; });
    calcKVARow(n);
  }
}

function calcKVARow(n) {
  const m = parseFloat(document.getElementById('kva-menge-'+n)?.value||0);
  const e = parseFloat(document.getElementById('kva-ep-'+n)?.value||0);
  const gpEl = document.getElementById('kva-gp-'+n);
  if (gpEl) gpEl.value = (m*e).toFixed(2);
  calcKVASumme();
}

function calcKVASumme() {
  let netto = 0;
  document.querySelectorAll('[id^="kva-gp-"]').forEach(el=>{ netto += parseFloat(el.value||0); });
  const rabatt = netto*(parseFloat(document.getElementById('kv-rabatt')?.value||0)/100);
  const mwstRate = parseFloat(document.getElementById('kv-mwst')?.value||19)/100;
  const mwst = (netto-rabatt)*mwstRate;
  const brutto = netto-rabatt+mwst;
  const fmt = v => '€ '+v.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
  const el = id => document.getElementById(id);
  if(el('kv-sum-netto')) el('kv-sum-netto').textContent = fmt(netto);
  if(el('kv-sum-rabatt')) el('kv-sum-rabatt').textContent = '- '+fmt(rabatt);
  if(el('kv-sum-mwst')) el('kv-sum-mwst').textContent = fmt(mwst);
  if(el('kv-sum-brutto')) el('kv-sum-brutto').textContent = fmt(brutto);
}

function kvaFillKunde(name) {
  const k = DB.get('kunden').find(x=>x.name===name);
  if (k) {
    document.getElementById('kv-kunde').value = k.name||'';
    document.getElementById('kv-kunde-adresse').value = k.adresse||'';
    document.getElementById('kv-kunde-kontakt').value = k.tel||k.kontakt||'';
  }
}

function saveKVADoc(id) {
  const docs = DB.get('kva_docs');
  const positionen = [];
  document.querySelectorAll('#kva-pos-body tr').forEach(tr=>{
    const n = tr.id.replace('kva-row-','');
    const bez = document.getElementById('kva-bez-'+n)?.value||'';
    if (!bez.trim()) return;
    const kat = tr.querySelector('select')?.value||'';
    const menge = parseFloat(document.getElementById('kva-menge-'+n)?.value||0);
    const einheit = document.getElementById('kva-einheit-'+n)?.value||'Stk';
    const ep = parseFloat(document.getElementById('kva-ep-'+n)?.value||0);
    positionen.push({kat,bezeichnung:bez,menge,einheit,ep});
  });

  const obj = {
    id: id||Date.now(),
    typ: document.getElementById('kv-typ')?.value||'kva',
    nummer: document.getElementById('kv-nummer')?.value||'',
    datum: document.getElementById('kv-datum')?.value||'',
    gueltigBis: document.getElementById('kv-gueltig')?.value||'',
    projektart: document.getElementById('kv-projektart')?.value||'',
    ort: document.getElementById('kv-ort')?.value||'',
    kunde: document.getElementById('kv-kunde')?.value||'',
    kundeAdresse: document.getElementById('kv-kunde-adresse')?.value||'',
    kundeKontakt: document.getElementById('kv-kunde-kontakt')?.value||'',
    positionen,
    rabatt: parseFloat(document.getElementById('kv-rabatt')?.value||0),
    mwst: parseFloat(document.getElementById('kv-mwst')?.value||19),
    notizen: document.getElementById('kv-notizen')?.value||'',
    zahlung: document.getElementById('kv-zahlung')?.value||'30',
    status: document.getElementById('kv-status')?.value||'Offen',
  };

  if (id) {
    const idx = docs.findIndex(x=>x.id===id);
    if (idx>=0) docs[idx] = obj;
  } else {
    docs.push(obj);
  }
  DB.set('kva_docs', docs);
  closeModal();
  showPage('kva');
}

function deleteKVADoc(id) {
  confirmDelete(
    currentLang==='sq'?'Dokumenti do të fshihet!':'Dokument wirklich löschen?',
    function(){DB.set('kva_docs',DB.get('kva_docs').filter(function(x){return x.id!==id;}));showPage('kva');}
  );
}

function exportData() {
  const data = {};
  ['kunden','projekte','auftraege','material','rechnungen','angebote','team','pruefungen','messgeraete','chat','profil'].forEach(k=>{
    data[k] = localStorage.getItem('elektrika_'+k);
  });
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'elektrika-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  notify('Export erfolgreich','success');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      Object.entries(data).forEach(([k,v])=>localStorage.setItem('elektrika_'+k,v));
      notify('Import erfolgreich — Seite wird neu geladen','success');
      setTimeout(()=>location.reload(),1000);
    } catch { notify('Fehler beim Import','danger'); }
  };
  reader.readAsText(file);
}

function openModal(title, body, buttons) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = buttons.map(b=>
    `<button class="btn ${b.primary?'btn-primary':b.danger?'btn-danger':'btn-secondary'}" onclick="${b.action||b.onclick}">${b.label}</button>`
  ).join('');
  document.getElementById('modal').classList.add('open');
}
window._delFn = null;
window._doDelete = function() { if(window._delFn){window._delFn();window._delFn=null;} closeModal(); };
function confirmDelete(msg, fn) {
  window._delFn = fn;
  openModal(
    currentLang==='sq'?'⚠️ Konfirmo Fshirjen':'⚠️ Löschen bestätigen',
    `<p style="text-align:center;padding:20px 8px;font-size:15px;color:var(--text)">${msg}</p>`,
    [
      {label: currentLang==='sq'?'🗑️ Po, fshi':'🗑️ Ja, löschen', action: '_doDelete()', danger: true},
      {label: currentLang==='sq'?'Anulo':'Abbrechen', action: 'closeModal()'}
    ]
  );
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

function notify(msg, type='info') {
  const colors = {success:'var(--success)',danger:'var(--danger)',warning:'var(--warning)',info:'var(--info)'};
  const icons = {success:'✓',danger:'✕',warning:'⚠',info:'ℹ'};
  const el = document.createElement('div');
  el.className = 'notification';
  el.innerHTML = `<span style="color:${colors[type]};font-size:16px">${icons[type]}</span><span>${msg}</span>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function filterTable(tableId, query) {
  const rows = document.querySelectorAll('#'+tableId+' tbody tr');
  rows.forEach(row => {
    const text = (row.dataset.search || row.textContent).toLowerCase();
    row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
  });
}

function globalSearch(q) {
  if (!q) return;
}

function escXml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportExcel() {
  const material = DB.get('material');
  const heute = new Date().toLocaleDateString('de-DE').replace(/\./g,'-');

  const header = ['Bezeichnung','Art','Bestand','Einheit','Mindestbestand','Preis (€)','Standort','Lieferant'];
  const headerRow = header.map(h=>`<Cell ss:StyleID="h"><Data ss:Type="String">${escXml(h)}</Data></Cell>`).join('');

  const dataRows = material.map(m=>`<Row>
    <Cell><Data ss:Type="String">${escXml(m.bezeichnung)}</Data></Cell>
    <Cell><Data ss:Type="String">${escXml(m.art)}</Data></Cell>
    <Cell><Data ss:Type="Number">${m.bestand}</Data></Cell>
    <Cell><Data ss:Type="String">${escXml(m.einheit)}</Data></Cell>
    <Cell><Data ss:Type="Number">${m.mindest}</Data></Cell>
    <Cell><Data ss:Type="Number">${m.preis}</Data></Cell>
    <Cell><Data ss:Type="String">${escXml(m.standort)}</Data></Cell>
    <Cell><Data ss:Type="String">${escXml(m.lieferant)}</Data></Cell>
  </Row>`).join('');

  const xml = `<?xml version="1.0" encoding="UTF-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
  xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"
  xmlns:x="urn:schemas-microsoft-com:office:excel">
  <Styles>
    <Style ss:ID="h">
      <Font ss:Bold="1" ss:Color="#FFFFFF"/>
      <Interior ss:Color="#F59E0B" ss:Pattern="Solid"/>
    </Style>
  </Styles>
  <Worksheet ss:Name="Lagerliste">
    <Table>
      <Column ss:Width="200"/>
      <Column ss:Width="100"/>
      <Column ss:Width="80"/>
      <Column ss:Width="70"/>
      <Column ss:Width="110"/>
      <Column ss:Width="80"/>
      <Column ss:Width="120"/>
      <Column ss:Width="150"/>
      <Row>${headerRow}</Row>
      ${dataRows}
    </Table>
  </Worksheet>
</Workbook>`;

  const blob = new Blob([xml], {type:'application/vnd.ms-excel;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Lagerliste_' + heute + '.xls';
  a.click();
  notify('📊 Excel exportiert', 'success');
}

// ===== LOGIN SYSTEM =====
const USERS_URL = 'https://raw.githubusercontent.com/RemiNguci-ai/elektrika-app/main/users.json';
let currentUser = null; // globale Variable – immer aktuell

async function checkLogin() {
  const saved = localStorage.getItem('elektrika_login');
  if (saved) {
    const user = JSON.parse(saved);
    try {
      const resp = await fetch(USERS_URL + '?t=' + Date.now(), {cache:'no-store'});
      const data = await resp.json();
      const localPin = localStorage.getItem('elektrika_local_pin_' + user.name.toLowerCase());
      const valid = data.users.find(u =>
        u.name.toLowerCase() === user.name.toLowerCase() &&
        u.aktiv !== false &&
        (u.pin === user.pin || (localPin !== null && localPin === user.pin))
      );
      if (valid) { showApp(user); return; }
      // Gesperrt
      localStorage.removeItem('elektrika_login');
      document.getElementById('login-error').textContent = '⛔ Dein Zugang wurde gesperrt. Chef kontaktieren.';
    } catch {
      // Offline → gespeicherte Daten verwenden
      showApp(user); return;
    }
  }
  document.getElementById('login-screen').classList.add('active');
}

function showApp(user) {
  currentUser = user;
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('current-user-name').textContent = '👤 ' + user.name;
}

async function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  const pin  = document.getElementById('login-pin').value.trim();
  const err  = document.getElementById('login-error');
  err.textContent = '';
  if (!name || pin.length < 4) { err.textContent = 'Name und 4-stellige PIN eingeben!'; return; }
  const btn = document.querySelector('.login-btn');
  btn.textContent = '⏳ Prüfe...'; btn.disabled = true;
  try {
    const resp = await fetch(USERS_URL + '?t=' + Date.now(), {cache:'no-store'});
    if (!resp.ok) throw new Error('Netzwerkfehler');
    const data = await resp.json();
    const localPin = localStorage.getItem('elektrika_local_pin_' + name.toLowerCase());
    const user = data.users.find(u =>
      u.name.toLowerCase() === name.toLowerCase() &&
      u.aktiv !== false &&
      (u.pin === pin || (localPin !== null && localPin === pin))
    );
    if (user) {
      localStorage.setItem('elektrika_login', JSON.stringify({name: user.name, pin: pin}));
      showApp(user);
    } else {
      err.textContent = '❌ Name oder PIN falsch, oder Zugang gesperrt!';
    }
  } catch {
    err.textContent = '📵 Kein Internet – bitte WLAN/Daten prüfen.';
  }
  btn.textContent = '🔓 Anmelden'; btn.disabled = false;
}

function doLogout() {
  if (!confirm('Wirklich abmelden?')) return;
  localStorage.removeItem('elektrika_login');
  location.reload();
}

      </div>

        <input type="password" id="pin-new2" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••"

      </div>
      <div id="pin-change-err" style="color:var(--danger);font-size:13px;min-height:18px;text-align:center"></div>
    </div>`,
    [
      {label: '💾 PIN speichern', action: 'savePinChange()', primary: true},
      {label: 'Abbrechen', action: 'closeModal()'}
    ]

}

function savePinChange() {
  const current = document.getElementById('pin-current').value.trim();
  const new1    = document.getElementById('pin-new1').value.trim();
  const new2    = document.getElementById('pin-new2').value.trim();
  const errEl   = document.getElementById('pin-change-err');
  errEl.textContent = '';
  if (current.length < 4) { errEl.textContent = 'Bitte aktuellen PIN eingeben!'; return; }
  if (new1.length < 4)    { errEl.textContent = 'Neuer PIN muss 4 Ziffern haben!'; return; }
  if (new1 !== new2)      { errEl.textContent = '❌ Neue PINs stimmen nicht überein!'; return; }
  if (new1 === current)   { errEl.textContent = 'Neuer PIN muss anders als der aktuelle sein!'; return; }
  const saved = JSON.parse(localStorage.getItem('elektrika_login') || '{}');
  const name = (saved.name || '').toLowerCase();
  const localPin = localStorage.getItem('elektrika_local_pin_' + name);
  const activePin = localPin !== null ? localPin : saved.pin;
  if (current !== activePin) { errEl.textContent = '❌ Aktueller PIN ist falsch!'; return; }
  localStorage.setItem('elektrika_local_pin_' + name, new1);
  localStorage.setItem('elektrika_login', JSON.stringify({name: saved.name, pin: new1}));
  closeModal();
  notify('✅ PIN erfolgreich geändert!', 'success');
}

document.getElementById('login-pin').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      // Neue Version gefunden → sofort aktivieren
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            // Neuer Service Worker bereit → App neu laden
            location.reload();
          }
        });
      });
      // Regelmäßig auf Updates prüfen (alle 60 Sekunden)
      setInterval(() => reg.update(), 60000);
    }).catch(()=>{});

    // Wenn neuer SW die Kontrolle übernimmt → neu laden
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      location.reload();
    });
  });
}
